name: Release

on:
  push:
    branches:
      - deployment

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Generate version
        id: version
        run: echo "tag=build-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Package standalone bundle
        run: |
          mkdir -p _release
          cp -r .next/standalone/.  _release/
          mkdir -p _release/.next
          cp -r .next/static         _release/.next/static
          cp -r public               _release/public
          cp ecosystem.config.cjs    _release/
          cp .env.example            _release/ 2>/dev/null || true
          tar -czf field-data-${{ steps.version.outputs.tag }}.tar.gz -C _release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: false
          files: field-data-${{ steps.version.outputs.tag }}.tar.gz
          body: |
            Built from `deployment` branch — commit `${{ github.sha }}`

            ## Deploy

            ```bash
            mkdir -p /srv/field-data
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/field-data-${{ steps.version.outputs.tag }}.tar.gz \
              | tar xz -C /srv/field-data

            cd /srv/field-data
            cp .env.example .env && nano .env   # set VIEW_ADMIN_KEY and EDIT_ADMIN_KEY

            pm2 start ecosystem.config.cjs
            pm2 save && pm2 startup

            sudo ln -s /srv/field-data/nginx/nginx.conf /etc/nginx/sites-enabled/field-data
            sudo nginx -t && sudo systemctl reload nginx
            ```

            App runs at **http://your-server:9898**
