name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package standalone bundle
        run: |
          mkdir -p _release
          cp -r .next/standalone/.  _release/
          mkdir -p _release/.next
          cp -r .next/static         _release/.next/static
          cp -r public               _release/public
          cp ecosystem.config.cjs    _release/
          cp .env.example            _release/
          tar -czf field-data-${{ github.ref_name }}.tar.gz -C _release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: field-data-${{ github.ref_name }}.tar.gz
          body: |
            ## Deploy on any server with Node 22 + PM2 + nginx

            ```bash
            # 1. extract release to your deploy directory
            mkdir -p /srv/field-data
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/field-data-${{ github.ref_name }}.tar.gz \
              | tar xz -C /srv/field-data

            # 2. set your keys
            cd /srv/field-data
            cp .env.example .env
            nano .env   # fill in VIEW_ADMIN_KEY and EDIT_ADMIN_KEY

            # 3. start with PM2
            pm2 start ecosystem.config.cjs
            pm2 save
            pm2 startup   # follow printed command to enable on boot

            # 4. link nginx config and reload
            sudo ln -s /srv/field-data/nginx.conf /etc/nginx/sites-enabled/field-data
            sudo nginx -t && sudo systemctl reload nginx
            ```

            App runs at **http://your-server:9898**
