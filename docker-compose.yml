services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
    volumes:
      - app_data:/app/data

  nginx:
    image: nginx:alpine
    ports:
      - "9898:80"
    volumes:
      - ./nginx/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  app_data:
